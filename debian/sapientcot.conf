# sapientcot configuration — /etc/default/sapientcot
# SPDX-License-Identifier: Apache-2.0
#
# SAPIENTCOT reads SAPIENT (BSI Flex 335) DetectionReports from a Fusion/HLDMM
# node and forwards them to TAK as Cursor-on-Target. Restart after edits:
#   sudo systemctl restart sapientcot

# Enable/disable the daemon.
# ENABLED=1

# CoT destination (Mesh SA or a TAK Server).
# COT_URL=udp+wo://239.2.3.1:6969

# SAPIENT node (Fusion/HLDMM or middleware) to read length-delimited protobuf from.
# SAPIENT_HOST=127.0.0.1
# SAPIENT_PORT=5010

# SAPIENT standard version: v2 (BSI Flex 335 v2.0) or v1.
# SAPIENT_VERSION=v2

# Frame length prefix (bytes / endianness) if a peer differs from the default.
# SAPIENT_LEN_BYTES=4
# SAPIENT_LEN_ENDIAN=little

# CoT event type for detections (default a-u-A, unknown air).
# COT_TYPE=a-u-A

# CoT stale ("timeout"), seconds.
# COT_STALE=60

# Debug logging.
# DEBUG=1
